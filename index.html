<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - From Me To You</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="background loginAndSignup">
    <div class="overlay">

      <div class="header">
        <img src="pigeon.png" class="logo">
        <h1>From Me To You</h1>
        <p class="tagline">A message to your future self</p>
      </div>

      <div class="container">
        <h2 id="form-title">Create An Account</h2>

        <!-- Sign Up Form -->
        <div id="signup-form">
          <input type="text"     id="username-input"        placeholder="Username">
          <input type="email"    id="email-input"           placeholder="Email">
          <input type="password" id="password-input"        placeholder="Password">
          <input type="password" id="confirmpassword-input" placeholder="Confirm Password">
          <button onclick="signUp()">Create Account</button>
          <p>Have an account? <span onclick="showLogin()" class="link"><u>Log in</u></span></p>
        </div>

        <!-- Log In Form -->
        <div id="login-form" style="display:none;">
          <input type="email"    id="login-email"    placeholder="Email">
          <input type="password" id="login-password" placeholder="Password">
          <button onclick="login()">Log In</button>
          <p>Don't have an account? <span onclick="showSignup()" class="link"><u>Create an account</u></span></p>
        </div>

        <p id="message"></p>
      </div>

    </div>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
