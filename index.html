<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - From Me To You</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h2>Sign Up</h2>

  <input type="text" id="username-input" placeholder="Name">

  <input type="email" id="email-input" placeholder="Email">

  <input type="password" id="password-input" placeholder="Password">

  <input type="password" id="confirmpassword-input" placeholder="Confirm Password">

  <button onclick="signUp()">Sign Up</button>

  <p id="message"></p>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFS0Wlt8EU5fFqxBpi3yMTaw-xiA2Iozs",
  authDomain: "from-me-to-you-d7305.firebaseapp.com",
  projectId: "from-me-to-you-d7305",
  storageBucket: "from-me-to-you-d7305.firebasestorage.app",
  messagingSenderId: "561689421556",
  appId: "1:561689421556:web:0600b5dee14c2b368b60a1"
};

const app = initializeApp(firebaseConfig);
export const db = getFirestore(app);
export const auth = getAuth(app);

window.signUp = function () {
  const email = document.getElementById("email-input").value;
  const password = document.getElementById("password-input").value;
  const confirmPassword = document.getElementById("confirmpassword-input").value;

  if (password !== confirmPassword) {
    document.getElementById("message").innerText = "Passwords do not match";
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("message").innerText = "Account created!";
    })
    .catch((error) => {
      document.getElementById("message").innerText = error.message;
    });
};

</script>

</body>
</html>
