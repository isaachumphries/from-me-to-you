<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>From You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="from-you-page">

   
    <div id="category-section">
        <h2>Browse Topics</h2>

        <div id="category-list">

         <button class="category-btn" onclick="openCategory('General')">General</button>
        <button class="category-btn" onclick="openCategory('Alcohol')">Alcohol</button>
        
        </div>

        

        <div class="create-category">
            <input type="text" id="new-category-input" placeholder="Create new category...">
            <button onclick="addCategory()">Add</button>
        </div>
    </div>

  
    <div id="category-content" style="display:none;">
        <button onclick="goBack()">← Back</button>
        <h2 id="category-title"></h2>

        <div class="tab-nav">
            <button onclick="openTab('notes')">Notes</button>
            <button onclick="openTab('wins')">Wins</button>
            <button onclick="openTab('advice')">Advice</button>
        </div>

        <div id="notes" class="tab-content"></div>
        <div id="wins" class="tab-content" style="display:none;"></div>
        <div id="advice" class="tab-content" style="display:none;"></div>
    </div>

</div>

<script type="module" src="social-browse-script.js"></script>
</body>
</html>
