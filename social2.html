<body>

  <div class="background loginAndSignup">

      <!-- Tabs -->
      <nav class="tab-bar">
        <a href="personal.html" class="tab">To Me</a>
        <a class="tab active">From You</a>
      </nav>

      <!-- Title -->
      <div class="top-section">
        <h1>Browse Categories</h1>
        <p>or <span id="openMakeCat" class="link">create a category</span></p>
      </div>

      <!-- Category Grid -->
      <div class="container" id="catBrowse"></div>

    </div>
  </div>

  
  <div class="make-cat-popup" id="make-cat" style="display:none;">

      <h1>Create Category</h1>

      <label>Category Name</label>
      <input type="text" id="catInput" placeholder="Ex: Motivation">

      <label>Description</label>
      <input type="text" id="catDesc" placeholder="Short description...">

      <button id="createCatBtn">Create</button>
      <button id="cancelCatBtn" class="cancelBtn">Cancel</button>
    </div>
  </div>

  <script type="module" src="social.js"></script>
